apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane-web
  labels:
    app: control-plane-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: control-plane-web
  template:
    metadata:
      labels:
        app: control-plane-web
    spec:
      containers:
        - name: control-plane-web
          image: control-plane-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"